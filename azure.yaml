name: repleague
metadata:
  template: repleague-simple-template
  description: RepLeague - Despliegue Simplificado (2 Web Apps)
services:
  backend:
    project: backend/src/RepLeague.API
    language: dotnet
    host: appservice
  frontend:
    project: frontend/replague
    language: node
    host: appservice
env:
  - name: AZURE_LOCATION
    default: eastus
  - name: AZURE_ENVIRONMENT
    default: prod
