<!--begin::Logo-->
<a routerLink="/dashboard" class="d-flex align-items-center gap-2 text-decoration-none">
  <!-- Full logo (visible when sidebar is expanded) -->
  <span class="app-sidebar-logo-default d-flex align-items-center gap-2">
    <span class="w-30px h-30px rounded-circle d-flex align-items-center justify-content-center"
          style="background-color: #FF7A1A;">
      <span class="text-white fw-boldest fs-7">RL</span>
    </span>
    <span class="text-white fw-boldest fs-4 letter-spacing-1">RepLeague</span>
  </span>
  <!-- Mini logo (visible when sidebar is minimized) -->
  <span class="app-sidebar-logo-minimize w-30px h-30px rounded-circle d-flex align-items-center justify-content-center"
        style="background-color: #FF7A1A;">
    <span class="text-white fw-boldest fs-7">RL</span>
  </span>
</a>
<!--end::Logo-->


<ng-container *ngIf="toggleEnabled">
  <!--begin::Sidebar toggle-->
  <div id="kt_app_sidebar_toggle"
    class="app-sidebar-toggle btn btn-icon btn-shadow btn-sm btn-color-muted btn-active-color-primary body-bg h-30px w-30px position-absolute top-50 start-100 translate-middle rotate"
    [ngClass]="toggleButtonClass" data-kt-toggle="true" [attr.data-kt-toggle-state]="toggleState"
    data-kt-toggle-target="body" [attr.data-kt-toggle-name]="toggleAttr">
    <app-keenicon name="double-left" class="fs-2 rotate-180"></app-keenicon>
  </div>
  <!--end::Sidebar toggle-->
</ng-container>
