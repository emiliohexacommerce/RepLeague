<div class="container-xxl" id="kt_content_container">
  <!-- Header -->
  <div class="d-flex flex-wrap flex-stack mb-6">
    <h3 class="fw-bolder my-2">My Leagues</h3>
    <div class="d-flex gap-3 my-2">
      <button class="btn btn-light btn-sm" (click)="toggleForm()">
        <i class="ki-duotone ki-plus fs-3"></i> Create League
      </button>
    </div>
  </div>

  <!-- Alerts -->
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <!-- Join by token -->
  <div class="card mb-6">
    <div class="card-body py-4">
      <div class="d-flex gap-3 align-items-center">
        <input type="text" class="form-control form-control-solid form-control-sm w-300px" placeholder="Paste invite token to join a league" [(ngModel)]="joinToken" />
        <button class="btn btn-sm btn-success" (click)="joinByToken()" [disabled]="!joinToken || joining">
          <span *ngIf="!joining">Join</span>
          <span *ngIf="joining">Joining...</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Create Form -->
  <div *ngIf="showForm" class="card mb-6">
    <div class="card-header">
      <h4 class="card-title">Create New League</h4>
      <div class="card-toolbar">
        <button type="button" class="btn btn-sm btn-light" (click)="toggleForm()">Cancel</button>
      </div>
    </div>
    <div class="card-body">
      <form [formGroup]="createForm" (ngSubmit)="submitCreate()">
        <div class="row g-4">
          <div class="col-md-6">
            <label class="form-label required">League Name</label>
            <input type="text" class="form-control form-control-solid" formControlName="name" placeholder="e.g. CrossFit Warriors" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Description</label>
            <input type="text" class="form-control form-control-solid" formControlName="description" placeholder="Optional description" />
          </div>
        </div>
        <div class="mt-4">
          <button type="submit" class="btn btn-primary" [disabled]="createForm.invalid || creating">
            <span *ngIf="!creating">Create</span>
            <span *ngIf="creating">Creating...</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-10">
    <span class="spinner-border text-primary"></span>
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading && leagues.length === 0" class="card">
    <div class="card-body text-center py-10">
      <i class="ki-duotone ki-crown fs-3x text-muted mb-4 d-block"></i>
      <h4 class="text-muted">You're not in any leagues yet</h4>
      <p class="text-muted">Create a league or join one with an invite token.</p>
    </div>
  </div>

  <!-- Leagues list -->
  <div *ngIf="!loading && leagues.length > 0" class="row g-5">
    <div *ngFor="let league of leagues" class="col-md-6 col-xl-4">
      <div class="card h-100 card-flush hoverable">
        <div class="card-body d-flex flex-column">
          <h4 class="fw-bold mb-2">{{ league.name }}</h4>
          <p *ngIf="league.description" class="text-muted fs-7 mb-4">{{ league.description }}</p>
          <div class="d-flex gap-4 mt-auto">
            <span class="text-muted fs-7"><i class="ki-duotone ki-people fs-5 me-1"></i>{{ league.memberCount }} members</span>
          </div>
        </div>
        <div class="card-footer d-flex justify-content-end py-3">
          <a [routerLink]="['/leagues', league.id]" class="btn btn-sm btn-light-primary">View League</a>
        </div>
      </div>
    </div>
  </div>
</div>
