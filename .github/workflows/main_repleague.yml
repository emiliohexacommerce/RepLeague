# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - repleague

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      - name: List frontend directory contents
        working-directory: ./frontend
        run: |
          echo "=== Contents of frontend directory ==="
          ls -la /
          echo ""
          echo "=== Contents of frontend/replague directory ==="
          ls -la replague/ || echo "Directory does not exist"
          echo ""
          echo "=== Search for all package.json files ==="
          find . -name "package.json" -type f
      - name: List RepLeague directory contents
        working-directory: ./replague
        run: |
          echo "=== Contents of frontend directory ==="
          ls -la /
          echo ""
      - name: npm install, build, and test
        working-directory: frontend/replague
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3BC00AA58BF94E6AA7092EF02BABF51B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C6CAF442A8034DE087CB317ED5918C46 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DCF7F825F43749E6B7305EBCFA39BA36 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'repleague'
          slot-name: 'Production'
          package: .

          




