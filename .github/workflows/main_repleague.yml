# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
#
# Azure App Service (Linux + Node 20) configuration:
#   - Startup Command: npm start
#   (This runs `node server.js` which serves the Angular SPA via Express)
#
# IMPORTANT: Set the following App Service application setting to prevent
# Azure Oryx from running `npm install` (we ship node_modules in the artifact):
#   SCM_DO_BUILD_DURING_DEPLOYMENT = false

name: Build and deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install NPM dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./frontend/replague

      - name: Build application
        run: npm run build
        working-directory: ./frontend/replague

      - name: Assemble deployment package
        run: |
          mkdir -p deploy
          # Copy Angular build output
          cp -r frontend/replague/dist deploy/dist
          # Copy Express server
          cp frontend/replague/server.js deploy/server.js
          # Use the minimal runtime package.json (express only, no Angular peer-dep conflicts)
          cp frontend/replague/deploy-runtime/package.json deploy/package.json
          cp frontend/replague/deploy-runtime/package-lock.json deploy/package-lock.json
          # Install only production runtime deps (express, express-rate-limit) so Azure
          # does not need to run npm install (SCM_DO_BUILD_DURING_DEPLOYMENT=false)
          npm ci --omit=dev --prefix deploy

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENTE_ID_FRONT }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID_FRONT }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_FRONT }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'repleague'
          slot-name: 'Production'
          package: .
